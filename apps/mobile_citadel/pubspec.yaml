  flutter_callkit_incoming: ^3.0.0
  mobile_scanner: ^7.1.4
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2
  gal: ^2.3.2
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
