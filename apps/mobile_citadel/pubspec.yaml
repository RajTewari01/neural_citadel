  google_fonts: ^6.1.0
  flutter_animate: ^4.5.2
  record: ^6.0.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  provider: ^6.1.1
  speech_to_text: ^7.0.0
  flutter_pdfview: ^1.3.2
  url_launcher: ^6.2.0
  image_picker: ^1.0.7
  video_player: ^2.8.2
  chewie: ^1.7.4
  battery_plus: ^6.0.0
  fl_chart: ^0.66.0
  disk_space_plus: ^0.2.6
  device_info_plus: ^10.1.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1
  sqflite: ^2.4.2
  path: ^1.9.0
