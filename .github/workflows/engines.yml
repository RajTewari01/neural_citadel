# ============================================================================
# Neural Citadel — Engines Pipeline
# ============================================================================
# Validates the massive fleet of 12 internal applications and 7 standalone
# subprocess engines.
# ============================================================================

name: "⚙️ Engines Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "infra/standalone/**"
  pull_request:
    branches: [main]

jobs:
  engine-lint:
    name: "🛠️ Engine Layer Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install flake8

      - name: Basic Engine Syntax Check
        run: |
          # Check for fatal syntax errors across all isolated engines
          flake8 apps/ infra/standalone/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,*.pyc
