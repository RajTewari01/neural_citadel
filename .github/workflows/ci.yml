name: "🏰 Gateway CI"
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "infra/server/**"
      - "configs/**"
      - "apps/**/runner.py"
      - "apps/**/engine.py"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: "🔍 Python Lint (Gateway + Configs)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install flake8 pyflakes
      - name: Flake8 — Fatal errors only
        run: flake8 infra/server/ configs/ --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,*.pyc
      - name: Pyflakes — Undefined name detection
        run: find infra/server/ -name "*.py" ! -path "*__pycache__*" -exec pyflakes {} +

  isolation-check:
    name: "🔒 Gateway Import Isolation"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install gateway dependencies
        run: pip install -r infra/server/requirements.txt
      - name: Verify zero ML imports in gateway
        run: |
          cat << 'EOF' > check_imports.py
          import sys, importlib, unittest.mock
          with unittest.mock.patch('asyncio.create_subprocess_exec'):
              try:
                  sys.path.insert(0, '.')
                  import infra.server.main
                  FORBIDDEN = ['torch', 'diffusers', 'transformers', 'tensorflow', 'onnxruntime', 'whisper', 'mediapipe']
                  leaked = [m for m in FORBIDDEN if m in sys.modules]
                  if leaked:
                      print(f'❌ ISOLATION BREACH: ML libraries loaded in gateway: {leaked}')
                      sys.exit(1)
                  else:
                      print('✅ Gateway import isolation verified.')
              except ImportError as e:
                  print(f'⚠️ Import warning: {e}')
          EOF
          python check_imports.py

  dep-audit:
    name: "📦 Gateway Dependency Audit"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install gateway dependencies
        run: pip install -r infra/server/requirements.txt
      - name: Verify no broken dependencies
        run: pip check
      - name: Print dependency tree
        run: |
          pip install pipdeptree
          pipdeptree --warn silence
